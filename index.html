<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GEM Tender Checker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- 🔥 AUTH SCRIPT -->
<script type="module">
import { auth } from "./firebase-config.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

window.__signOut = () => signOut(auth).then(()=>location.href="login.html");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = "login.html";
    return;
  }

  window.__authUser = user;

  const uid = user.uid;
  const cacheKey = "gem_p_" + uid;
  const cached = localStorage.getItem(cacheKey);

  // ✅ CACHE FIRST
  if (cached) {
    try {
      const profile = JSON.parse(cached);
      if (profile?.companyName) {
        window.__appStatus = "dashboard";
        window.__currentProfile = profile;
        return;
      }
    } catch {
      localStorage.removeItem(cacheKey);
    }
  }

  // ✅ SERVER FETCH
  try {
    const res = await fetch(`${window.location.origin}/api/profile?uid=${uid}`);
    const data = await res.json();

    if (data.profile) {
      localStorage.setItem(cacheKey, JSON.stringify(data.profile));
      window.__appStatus = "dashboard";
      window.__currentProfile = data.profile;
    } else {
      window.__appStatus = "setup";
    }

  } catch {
    if (cached) {
      window.__appStatus = "dashboard";
      window.__currentProfile = JSON.parse(cached);
    } else {
      window.__appStatus = "setup";
    }
  }
});
</script>

<!-- 🔥 REACT APP -->
<script type="text/babel">
const { useState, useEffect } = React;

/* LOADING */
function LoadingScreen(){
  return (
    <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <h3>Connecting to server...</h3>
    </div>
  );
}

/* SETUP SCREEN */
function SetupScreen({ onSaved }) {
  const user = window.__authUser; // ✅ FIX

  const [company, setCompany] = useState("");

  const save = () => {
    if (!company) return alert("Enter company name");

    const profile = {
      companyName: company,
      email: user.email
    };

    localStorage.setItem("gem_p_" + user.uid, JSON.stringify(profile));

    fetch(window.location.origin + "/api/profile", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ uid:user.uid, profile })
    });

    onSaved(profile);
  };

  return (
    <div style={{padding:40}}>
      <h2>Set Up Company Profile</h2>

      <p>Logged in as <b>{user?.email || "Loading..."}</b></p>

      <input
        placeholder="Company Name"
        value={company}
        onChange={e=>setCompany(e.target.value)}
      />

      <br/><br/>

      <button onClick={save}>Save & Continue</button>
    </div>
  );
}

/* DASHBOARD */
function Dashboard({ profile }) {
  return (
    <div style={{padding:40}}>
      <h2>Dashboard</h2>

      <p><b>Company:</b> {profile.companyName}</p>
      <p><b>Email:</b> {profile.email}</p>

      <button onClick={()=>window.__signOut()}>Logout</button>
    </div>
  );
}

/* APP ROOT */
function App(){
  const [screen, setScreen] = useState("loading");
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    const check = setInterval(() => {

      if (window.__appStatus === "dashboard") {
        setProfile(window.__currentProfile);
        setScreen("dashboard");
        clearInterval(check);
      }

      if (window.__appStatus === "setup") {
        setScreen("setup");
        clearInterval(check);
      }

    }, 300);

    return () => clearInterval(check);
  }, []);

  if (screen === "loading") return <LoadingScreen/>;
  if (screen === "setup") return <SetupScreen onSaved={(p)=>{setProfile(p);setScreen("dashboard");}}/>;

  return <Dashboard profile={profile}/>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>

</body>
</html>
