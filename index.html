<script type="module">
  import { auth } from "./firebase-config.js";
  import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const SERVER = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
    ? "http://localhost:3000"
    : window.location.origin;

  const CACHE  = uid => "gem_p_" + uid;

  // Store signOut for React
  window.__signOut = () => signOut(auth).then(() => window.location.href = "login.html").catch(() => window.location.href = "login.html");
  window.__SERVER  = SERVER;

  onAuthStateChanged(auth, async (user) => {
  window.__gem = true;
  window.__authUser = user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const key = CACHE(user.uid);
  const cached = localStorage.getItem(key);

  // 🔥 DEFAULT loading state
  window.__appStatus = "loading";

  // ✅ CACHE → direct dashboard
  if (cached) {
    try {
      const profile = JSON.parse(cached);
      if (profile && profile.companyName) {
        window.__appStatus = "dashboard";
        window.__currentProfile = profile;
        return;
      }
    } catch(e) {
      localStorage.removeItem(key);
    }
  }

  // 🔄 SERVER FETCH
  try {
    const res = await fetch(`${SERVER}/api/profile?uid=${user.uid}`);
    if (res.ok) {
      const d = await res.json();

      if (d?.profile?.companyName) {
        localStorage.setItem(key, JSON.stringify(d.profile));

        window.__appStatus = "dashboard";
        window.__currentProfile = d.profile;
      } else {
        window.__appStatus = "setup";
      }
    } else {
      window.__appStatus = "setup";
    }
  } catch (e) {
    console.warn("Server sleep — fallback to cache/setup");

    // 🔥 fallback
    if (cached) {
      window.__appStatus = "dashboard";
      window.__currentProfile = JSON.parse(cached);
    } else {
      window.__appStatus = "setup";
    }
  }
});
</script>

function LoadingScreen() {
  const [msg, setMsg] = useState("Loading your account...");
  const [seconds, setSeconds] = useState(0);

  useEffect(() => {
    const interval = setInterval(() => setSeconds(s => s + 1), 1000);
    const t1 = setTimeout(() => setMsg("Connecting to server..."), 3000);
    const t2 = setTimeout(() => setMsg("Server waking up (free tier) — please wait..."), 8000);
    const t3 = setTimeout(() => setMsg("Almost ready, fetching your data..."), 25000);
    const t4 = setTimeout(() => setMsg("Final connection retry..."), 45000);
    return () => { 
      clearInterval(interval);
      clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
    };
  }, []);

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,background:"#f0f2f7",padding:20}}>

        setLStep(2);

                onDragLeave={e=>e.currentTarget.classList.remove("drag-over")}
                onDrop={e=>{e.preventDefault();e.currentTarget.classList.remove("drag-over");onFiles(e.dataTransfer.files);}}>
                <div className="dz-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
                <div className="dz-title">Drop Documents Here</div>
                <div className="dz-sub">Drop your GEM tender PDFs downloaded from the GEM portal<br/>Drag & drop or click to browse your files</div>
                <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:14}}>
                  <div className="dz-btn" style={{margin:0}} onClick={e=>{e.stopPropagation();fileRef.current.click();}}>📄 Select Files</div>
                  <div className="dz-btn" style={{margin:0,background:"#4f46e5"}} onClick={e=>{e.stopPropagation();folderRef.current.click();}}>📁 Select Folder</div>
                </div>
                <div className="dz-formats" style={{marginTop:10}}>PDF files only  •  Unlimited documents  •  Select files or entire folder</div>
              </div>
              <input ref={fileRef} type="file" accept=".pdf" multiple style={{display:"none"}} onChange={e=>onFiles(e.target.files)}/>
              <input ref={folderRef} type="file" accept=".pdf" multiple webkitdirectory="" style={{display:"none"}} onChange={e=>onFiles(e.target.files)}/>
              {files.length>0&&(
                <div className="file-queue">
                  {files.map((f,i)=>(
                    <div key={i} className="fitem">
                      <div className="ficon">PDF</div>
                      <div style={{flex:1}}><div className="fname">{f.name}</div><div className="fsize">{(f.size/1024).toFixed(0)} KB</div></div>
                      <div style={{fontSize:11,color:"#94a3b8",marginRight:10}}>#{i+1}</div>
                      <button className="frem" onClick={()=>setFiles(files.filter((_,j)=>j!==i))}>×</button>
                    </div>
                  ))}
                </div>
              )}
              <div className="analyze-bar">
                <div className="analyze-bar-text">
                  <h3>AI Eligibility Analysis</h3>
                  <p>{!files.length?"Upload documents to begin analysis":`${files.length} file(s) ready — ${profile.companyName} criteria will be matched`}</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"flex-end"}}>
                  <button className="btn-analyze" disabled={!files.length||analyzing} onClick={analyze}>
                    {analyzing?"Analyzing...":`Analyze ${files.length} Document${files.length!==1?"s":""} →`}
                  </button>
                </div>
              </div>
            </>
          )}

          {view==="results"&&(
            <>
              <div className="panel-header" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div className="panel-title">Analysis Results</div>
                  <div className="panel-sub">
                    {results.length} document{results.length!==1?"s":""} analyzed &nbsp;•&nbsp; {profile.companyName}
                    {results.length>0&&<>&nbsp;•&nbsp;<span style={{color:"#16a34a",fontWeight:500}}>{results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE").length} eligible</span>&nbsp;/&nbsp;<span style={{color:"#dc2626",fontWeight:500}}>{results.filter(r=>!r.error&&r.eligibilityVerdict==="NOT_ELIGIBLE").length} not eligible</span></>}
                  </div>
                </div>
                {results.length > 0 && (
                  <button onClick={clearHistory} style={{background:"transparent",color:"#dc2626",border:"1px solid #fca5a5",padding:"7px 14px",borderRadius:8,fontSize:11,cursor:"pointer",fontWeight:500,transition:"all 0.15s"}}
                    onMouseOver={e=>e.target.style.background="#fff1f2"} onMouseOut={e=>e.target.style.background="transparent"}>
                    🗑 Clear History
                  </button>
                )}
              </div>
              {analyzing&&(
                <div className="lcard">
                  <div className="spin"></div>
                  <div style={{fontSize:15,fontWeight:600,color:"#0f172a",marginBottom:5}}>Reading documents...</div>
                  <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>{loadMsg}</div>
                  <div className="lsteps">
                    {["Extracting PDF text","Matching company criteria","Analyzing work details","Preparing results"].map((s,i)=>(
                      <div key={i} className={`lstep${lStep===i?" act":""}`}>{s}</div>
                    ))}
                  </div>
                </div>
              )}
              {!analyzing&&results.length===0&&(
                <div className="empty"><div className="empty-icon">📊</div><h3>No results yet</h3><p>Go to the Upload tab to analyze documents</p>
                  <button style={{marginTop:16,background:"#1d4ed8",color:"#fff",border:"none",padding:"10px 22px",borderRadius:9,fontSize:12,cursor:"pointer",fontWeight:600}} onClick={()=>setView("upload")}>← Go to Upload</button>
                </div>
              )}

              {/* ── CHANCES CHART — shows when 2+ results ── */}
              {!analyzing && results.filter(r=>!r.error).length >= 1 && (
                <div className="card" style={{marginBottom:20}}>
                  <div style={{fontFamily:"Space Grotesk,sans-serif",fontSize:14,fontWeight:700,color:"#0f172a",marginBottom:16,display:"flex",alignItems:"center",gap:8}}>
                    📊 Project Chances Overview
                    <span style={{flex:1,height:1,background:"#e2e8f0",display:"inline-block"}}></span>
                    <span style={{fontSize:11,color:"#64748b",fontWeight:400}}>{results.filter(r=>!r.error).length} projects analyzed</span>
                  </div>

                  {/* Summary pills */}
                  <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
                    {[
                      {label:"High Chances",  count:results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE").length,       color:"#16a34a",bg:"#f0fdf4",border:"#86efac"},
                      {label:"Partial",       count:results.filter(r=>!r.error&&r.eligibilityVerdict==="PARTIALLY_ELIGIBLE").length, color:"#d97706",bg:"#fffbeb",border:"#fcd34d"},
                      {label:"Not Eligible",  count:results.filter(r=>!r.error&&r.eligibilityVerdict==="NOT_ELIGIBLE").length,   color:"#dc2626",bg:"#fff1f2",border:"#fca5a5"},
                    ].map(({label,count,color,bg,border})=>(
                      <div key={label} style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"10px 18px",textAlign:"center",minWidth:100}}>
                        <div style={{fontFamily:"Space Grotesk,sans-serif",fontSize:24,fontWeight:700,color}}>{count}</div>
                        <div style={{fontSize:11,color,fontWeight:500}}>{label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Bar chart */}
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {results.filter(r=>!r.error).map((r,i)=>{
                      const verdict = r.eligibilityVerdict;
                      const isEligible  = verdict==="ELIGIBLE";
                      const isPartial   = verdict==="PARTIALLY_ELIGIBLE";
                      const barColor    = isEligible?"#16a34a":isPartial?"#d97706":"#dc2626";
                      const barBg       = isEligible?"#f0fdf4":isPartial?"#fffbeb":"#fff1f2";
                      const barWidth    = isEligible?"90%":isPartial?"55%":"15%";
                      const chanceLabel = isEligible?"High Chances ✓":isPartial?"Partial — Review":"Not Eligible ✗";
                      const icon        = isEligible?"✅":isPartial?"⚠️":"❌";
                      const name        = r.tenderTitle || r.file.replace('.pdf','').replace('GeM-Bidding-','Bid #').replace('GEM-Bidding-','Bid #');
                      const value       = r.estimatedValue || "";
                      return (
                        <div key={i} style={{background:barBg,border:`1px solid ${barColor}33`,borderRadius:10,padding:"12px 16px"}}>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                              <span style={{fontSize:16,flexShrink:0}}>{icon}</span>
                              <div style={{minWidth:0}}>
                                <div style={{fontSize:12,fontWeight:600,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div>
                                <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                                  {value && <span style={{fontSize:10,color:"#64748b"}}>💰 {value}</span>}
                                  {r.deadline && <span style={{fontSize:10,color:"#64748b"}}>📅 {r.deadline}</span>}
                                  {r.scopeOfWork?.workType && <span style={{fontSize:10,color:"#64748b"}}>🏷 {r.scopeOfWork.workType}</span>}
                                </div>
                              </div>
                            </div>
                            <div style={{flexShrink:0,textAlign:"right",marginLeft:12}}>
                              <div style={{fontSize:11,fontWeight:700,color:barColor}}>{chanceLabel}</div>
                            </div>
                          </div>
                          {/* Progress bar */}
                          <div style={{background:"#e2e8f0",borderRadius:20,height:8,overflow:"hidden"}}>
                            <div style={{width:barWidth,height:"100%",background:barColor,borderRadius:20,transition:"width 0.8s ease"}}></div>
                          </div>
                          {/* Quick summary */}
                          {r.eligibilityBreakdown && (
                            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                              {Object.entries(r.eligibilityBreakdown).map(([key,val])=>{
                                if(!val||val.status==="NA") return null;
                                const s = val.status;
                                const sc = s==="PASS"||s==="WAIVED"?"#16a34a":s==="FAIL"?"#dc2626":"#d97706";
                                const sb = s==="PASS"||s==="WAIVED"?"#dcfce7":s==="FAIL"?"#fee2e2":"#fef3c7";
                                const labels = {turnover:"Turnover",experience:"Experience",oem:"OEM",category:"Category",location:"Location"};
                                return (
                                  <span key={key} style={{background:sb,color:sc,fontSize:9,padding:"2px 7px",borderRadius:20,fontWeight:700}}>
                                    {s==="PASS"||s==="WAIVED"?"✓":"✗"} {labels[key]||key}
                                  </span>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* Best recommendation */}
                  {results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE").length > 0 && (
                    <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"12px 16px",marginTop:16,display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>🎯</span>
                      <div>
                        <div style={{fontSize:12,fontWeight:700,color:"#1d4ed8",marginBottom:2}}>Best Project to Apply</div>
                        <div style={{fontSize:12,color:"#1e40af"}}>
                          {(()=>{
                            const best = results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE")[0];
                            return (best?.tenderTitle || best?.file || "").replace('.pdf','');
                          })()}
                          {results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE").length > 1 && ` and ${results.filter(r=>!r.error&&r.eligibilityVerdict==="ELIGIBLE").length-1} more`}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {!analyzing&&results.map((r,idx)=>r.error?(
                <div key={idx} className="card" style={{borderLeft:"3px solid #fca5a5"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:16}}>❌</span><div style={{color:"#dc2626",fontWeight:600,fontSize:13}}>{r.file}</div></div>
                  <div style={{fontSize:12,color:"#64748b",background:"#fff1f2",padding:"10px 12px",borderRadius:8,lineHeight:1.6}}>{r.error}</div>
                </div>
              ):(
                <div key={idx} style={{marginBottom:36}}>
                  <div className="rhead">
                    <div className="rco">{profile.companyName} — Document {idx+1} of {results.length}</div>
                    <div className="rdoc">{r.tenderTitle||r.file}</div>
                    <div className="rref">{r.tenderRef&&`Ref: ${r.tenderRef} • `}{r.ministry}</div>
                    <div className="rpills">
                      {r.estimatedValue&&<span className="rp rpb">💰 {r.estimatedValue}</span>}
                      {r.workType&&<span className="rp rpb">🏷 {r.workType}</span>}
                      {r.deadline&&<span className="rp rpa">📅 {r.deadline}</span>}
                      <span className={`rp ${r.eligibilityVerdict==="ELIGIBLE"?"rpg":r.eligibilityVerdict==="NOT_ELIGIBLE"?"rpr":"rpa"}`}>{vico(r.eligibilityVerdict)} {r.eligibilityVerdict}</span>
                    </div>
                  </div>
                  <div className={vcls(r.eligibilityVerdict)}>
                    <div className="vicon">{vico(r.eligibilityVerdict)}</div>
                    <div><div className="vtitle">{vlbl(r.eligibilityVerdict)}</div><div className="vdesc">{r.verdictReason}</div></div>
                  </div>
                  {/* ── SCOPE OF WORK ── */}
                  {r.scopeOfWork && (
                    <div className="card" style={{marginBottom:14}}>
                      <div className="sh">📋 Scope of Work</div>
                      <div style={{background:"#f8fafc",borderRadius:9,padding:"12px 14px",marginBottom:12,fontSize:12,color:"#334155",lineHeight:1.7,borderLeft:"3px solid #2563eb"}}>
                        {r.scopeOfWork.summary}
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                        {[
                          ["Work Type",      r.scopeOfWork.workType],
                          ["Location",       r.scopeOfWork.deliveryLocation],
                          ["Timeline",       r.scopeOfWork.timeline],
                        ].map(([k,v])=> v && (
                          <div key={k} style={{background:"#f1f5f9",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:9,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>{k}</div>
                            <div style={{fontSize:12,color:"#0f172a",fontWeight:500}}>{v}</div>
                          </div>
                        ))}
                      </div>
                      <div className="sh">Deliverables</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6}}>
                        {(r.scopeOfWork.deliverables||[]).map((d,i)=>(
                          <div key={i} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderLeft:"3px solid #2563eb",borderRadius:"0 8px 8px 0",padding:"9px 12px",fontSize:12,color:"#0f172a",lineHeight:1.5}}>• {d}</div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* ── ELIGIBILITY BREAKDOWN ── */}
                  <div className={vcls(r.eligibilityVerdict)}>
                    <div className="vicon">{vico(r.eligibilityVerdict)}</div>
                    <div style={{flex:1}}>
                      <div className="vtitle">{vlbl(r.eligibilityVerdict)}</div>
                      {r.eligibilityBreakdown && (
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:12}}>
                          {Object.entries(r.eligibilityBreakdown).map(([key, val])=>{
                            if(!val || val.status==="NA") return null;
                            const statusColor = val.status==="PASS"||val.status==="WAIVED" ? "#16a34a" : "#dc2626";
                            const statusBg    = val.status==="PASS"||val.status==="WAIVED" ? "#f0fdf4" : "#fff1f2";
                            const icon = val.status==="PASS"?"✓":val.status==="WAIVED"?"◎":"✗";
                            const labels = {turnover:"Turnover",experience:"Experience",oem:"OEM Requirement",category:"Work Category",location:"Location"};
                            return (
                              <div key={key} style={{background:statusBg,border:`1px solid ${statusColor}33`,borderRadius:9,padding:"10px 12px"}}>
                                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                                  <span style={{color:statusColor,fontWeight:700,fontSize:13}}>{icon}</span>
                                  <span style={{fontSize:11,fontWeight:700,color:statusColor,textTransform:"uppercase",letterSpacing:"0.4px"}}>{labels[key]||key}</span>
                                  {(val.mseWaiver||val.startupWaiver) && <span style={{background:"#dbeafe",color:"#1d4ed8",fontSize:9,padding:"1px 6px",borderRadius:20,fontWeight:600}}>WAIVED</span>}
                                </div>
                                {val.required && <div style={{fontSize:11,color:"#475569"}}>Required: <strong>{val.required}</strong></div>}
                                {val.companyHas && <div style={{fontSize:11,color:"#475569"}}>Yours: <strong>{val.companyHas}</strong></div>}
                                <div style={{fontSize:10,color:"#64748b",marginTop:3,fontStyle:"italic",lineHeight:1.4}}>{val.reason}</div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* ── DOCUMENTS BUYER IS ASKING ── */}
                  {r.documentsAskedByBuyer?.length > 0 && (
                    <div className="card" style={{marginBottom:14}}>
                      <div className="sh">📄 Documents Buyer is Asking For</div>
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                          <thead>
                            <tr style={{background:"#f8fafc"}}>
                              {["#","Document","Purpose","Category","Mandatory"].map(h=>(
                                <th key={h} style={{padding:"8px 12px",textAlign:h==="#"||h==="Mandatory"?"center":"left",fontSize:10,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.4px",borderBottom:"1px solid #e2e8f0"}}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {r.documentsAskedByBuyer.map((d,i)=>{
                              const catColor = {Eligibility:"#7c3aed",Technical:"#0891b2",Financial:"#d97706",OEM:"#b45309",Experience:"#0284c7",Turnover:"#16a34a",Compliance:"#dc2626"}[d.category]||"#475569";
                              return (
                                <tr key={i} style={{borderBottom:"1px solid #f1f5f9",background:i%2===0?"#fff":"#fafafa"}}>
                                  <td style={{padding:"9px 12px",color:"#94a3b8",fontWeight:600,textAlign:"center"}}>{i+1}</td>
                                  <td style={{padding:"9px 12px",fontWeight:600,color:"#0f172a"}}>{d.name}</td>
                                  <td style={{padding:"9px 12px",color:"#475569",fontSize:11,lineHeight:1.4}}>{d.purpose}</td>
                                  <td style={{padding:"9px 12px"}}>
                                    <span style={{background:`${catColor}18`,color:catColor,fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:600,whiteSpace:"nowrap"}}>{d.category}</span>
                                  </td>
                                  <td style={{padding:"9px 12px",textAlign:"center"}}>
                                    <span style={{background:d.mandatory?"#fee2e2":"#f0fdf4",color:d.mandatory?"#dc2626":"#16a34a",fontSize:10,padding:"2px 8px",borderRadius:20,fontWeight:600}}>{d.mandatory?"Must":"Optional"}</span>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {/* ── IF ELIGIBLE: HOW TO APPLY + DOCS TO SUBMIT ── */}
                  {r.eligibilityVerdict !== "NOT_ELIGIBLE" && r.ifEligible && (
                    <div className="card" style={{marginBottom:14,border:"1.5px solid #86efac",background:"#f0fdf4"}}>
                      <div className="sh" style={{color:"#15803d"}}>✅ How to Apply</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
                        {(r.ifEligible.whatToDo||[]).map((s,i)=>(
                          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"10px 13px",background:"#fff",border:"1px solid #bbf7d0",borderRadius:9}}>
                            <div style={{width:24,height:24,borderRadius:"50%",background:"#16a34a",color:"#fff",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"Space Grotesk,sans-serif"}}>{i+1}</div>
                            <div style={{fontSize:12,color:"#166534",lineHeight:1.5,paddingTop:2}}>{s}</div>
                          </div>
                        ))}
                      </div>

                      <div className="sh" style={{color:"#15803d"}}>Documents to Submit</div>
                      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                        {(r.ifEligible.documentsToSubmit||[]).map((d,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:d.companyHasIt?"#f0fdf4":"#fff7ed",border:`1px solid ${d.companyHasIt?"#86efac":"#fed7aa"}`,borderRadius:9}}>
                            <span style={{fontSize:16}}>{d.companyHasIt?"✅":"⚠️"}</span>
                            <div style={{flex:1}}>
                              <div style={{fontSize:12,fontWeight:600,color:"#0f172a"}}>{d.name}</div>
                              <div style={{fontSize:10,color:"#64748b"}}>{d.forWhat}</div>
                            </div>
                            <span style={{fontSize:10,fontWeight:600,color:d.companyHasIt?"#16a34a":"#d97706",background:d.companyHasIt?"#dcfce7":"#fef3c7",padding:"2px 8px",borderRadius:20}}>{d.companyHasIt?"You have it":"Get this"}</span>
                          </div>
                        ))}
                      </div>

                      {r.ifEligible.startupAdvantages && (
                        <div style={{background:"#dbeafe",borderRadius:9,padding:"10px 14px",fontSize:12,color:"#1e40af",lineHeight:1.6}}>
                          <strong>🚀 Your Advantages:</strong> {r.ifEligible.startupAdvantages}
                        </div>
                      )}
                    </div>
                  )}

                  {/* ── IF NOT ELIGIBLE: REASONS ── */}
                  {r.eligibilityVerdict === "NOT_ELIGIBLE" && r.ifNotEligible && (
                    <div className="card" style={{marginBottom:14,border:"1.5px solid #fca5a5",background:"#fff1f2"}}>
                      <div className="sh" style={{color:"#be123c"}}>❌ Why Not Eligible</div>
                      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                        {(r.ifNotEligible.mainReasons||[]).map((reason,i)=>(
                          <div key={i} style={{display:"flex",gap:10,padding:"10px 13px",background:"#fff",border:"1px solid #fca5a5",borderRadius:9}}>
                            <span style={{color:"#dc2626",fontWeight:700,fontSize:14,flexShrink:0}}>✗</span>
                            <div style={{fontSize:12,color:"#9f1239",lineHeight:1.5}}>{reason}</div>
                          </div>
                        ))}
                      </div>

                      {r.ifNotEligible.missingDocuments?.length > 0 && (
                        <>
                          <div className="sh" style={{color:"#be123c"}}>Missing Documents</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
                            {r.ifNotEligible.missingDocuments.map((d,i)=>(
                              <span key={i} style={{background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:500}}>📄 {d}</span>
                            ))}
                          </div>
                        </>
                      )}

                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        {r.ifNotEligible.canApplyAfter && (
                          <div style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:9,padding:"12px 14px"}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#d97706",textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:4}}>Can Apply After</div>
                            <div style={{fontSize:12,color:"#92400e"}}>{r.ifNotEligible.canApplyAfter}</div>
                          </div>
                        )}
                        {r.ifNotEligible.suggestions && (
                          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:9,padding:"12px 14px"}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#1d4ed8",textTransform:"uppercase",letterSpacing:"0.4px",marginBottom:4}}>What To Do</div>
                            <div style={{fontSize:12,color:"#1e40af"}}>{r.ifNotEligible.suggestions}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {r.overallAdvantage && <div className="abox ai" style={{marginBottom:0}}><strong>💡 Overall Advantage:</strong> {r.overallAdvantage}</div>}                </div>
              ))}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ROOT APP — manages screens
══════════════════════════════════════ */
function App() {
  const [screen, setScreen]   = useState("loading"); // loading | setup | dashboard
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    console.log("App mounted, polling for auth status...");
    const poll = setInterval(() => {
      if (!window.__appStatus) return;
      const status = window.__appStatus;
      const profile = window.__currentProfile;
      console.log("Poll status:", status);

      if (status === "loading") return;

      // Got a final status — clear interval and update React
      clearInterval(poll);
      console.log("→ Switching to screen:", status);

      if (status === "dashboard") { setProfile(profile); setScreen("dashboard"); }
      else if (status === "setup") { setScreen("setup"); }
      else { setScreen("setup"); } // fallback to setup never error
    }, 200);

    // Safety timeout — fall back to setup (NOT error)
    const timeout = setTimeout(() => {
  clearInterval(poll);
  console.warn("Auth timeout — fallback safe mode");

  // ✅ ONLY fallback if nothing available
  if (!window.__appStatus || window.__appStatus === "loading") {

    const user = window.__authUser;
    if (user) {
      const key = "gem_p_" + user.uid;
      const cached = localStorage.getItem(key);

      if (cached) {
        try {
          const profile = JSON.parse(cached);
          if (profile?.companyName) {
            window.__appStatus = "dashboard";
            window.__currentProfile = profile;
            setProfile(profile);
            setScreen("dashboard");
            return;
          }
        } catch(e) {}
      }
    }

    // 🔴 LAST fallback only
    window.__appStatus = "setup";
    setScreen("setup");
  }

}, 20000);

    return () => { clearInterval(poll); clearTimeout(timeout); };
  }, []);

  if (screen === "loading") return <LoadingScreen/>;

  if (screen === "setup") return <SetupScreen onSaved={p=>{setProfile(p);setScreen("dashboard");}}/>;

  return <Dashboard profile={profile}/>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
